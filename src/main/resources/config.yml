# ==========================================
#              DAILY LOGIN
# ==========================================
daily-login:
  enabled: true
  # Ricompense per streak di giorni consecutivi
  streak-rewards:
    1:
      key-type: comune
      key-amount: 1
    2:
      key-type: comune
      key-amount: 2
    3:
      key-type: non_comune
      key-amount: 1
    4:
      key-type: comune
      key-amount: 2
    5:
      key-type: non_comune
      key-amount: 1
    6:
      key-type: non_comune
      key-amount: 2
    7:
      key-type: raro
      key-amount: 1
    14:
      key-type: epico
      key-amount: 1
    30:
      key-type: leggendario
      key-amount: 1
    60:
      key-type: mitico
      key-amount: 1

# ==========================================
#                  QUEST
# ==========================================
quests:
  kill_100_mobs:
    display-name: "&eCacciatore"
    description: "Uccidi 100 mob"
    type: KILL_MOBS
    target: 100
    reward-key: comune
    reward-amount: 2
  mine_500_blocks:
    display-name: "&eMineratore"
    description: "Mina 500 blocchi"
    type: MINE_BLOCKS
    target: 500
    reward-key: non_comune
    reward-amount: 1
  kill_50_players:
    display-name: "&cGuerriero"
    description: "Uccidi 50 giocatori"
    type: KILL_PLAYERS
    target: 50
    reward-key: raro
    reward-amount: 1
  fish_200:
    display-name: "&9Pescatore"
    description: "Pesca 200 pesci"
    type: FISH
    target: 200
    reward-key: non_comune
    reward-amount: 2
  craft_1000:
    display-name: "&aArtigiano"
    description: "Crafta 1000 oggetti"
    type: CRAFT_ITEMS
    target: 1000
    reward-key: raro
    reward-amount: 1
  kill_boss_10:
    display-name: "&5Cacciatore di Boss"
    description: "Uccidi 10 boss (Ender Dragon / Wither)"
    type: KILL_BOSS
    target: 10
    reward-key: epico
    reward-amount: 1
  reach_level_50:
    display-name: "&6Esperto"
    description: "Raggiungi il livello 50 di esperienza"
    type: REACH_LEVEL
    target: 50
    reward-key: epico
    reward-amount: 1

# ==========================================
#              ANIMAZIONE SPIN
# ==========================================
animation:
  spin-time: 40        # tick totali animazione (2 secondi)
  spin-delay: 2        # tick per ogni frame
  sound-spin: BLOCK_NOTE_BLOCK_PLING
  sound-win: ENTITY_PLAYER_LEVELUP
  firework-on-win: true
